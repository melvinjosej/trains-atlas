<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    
    <!-- 🚨 Ultra-Robust Diagnostic Console for Remote Workspace Debugging -->
    <script>
      (function() {
        const logs = [];
        function log(msg, isError = false) {
          logs.push((isError ? '❌ ' : 'ℹ️ ') + msg);
          updateScreen();
        }
        
        // Intercept resource load failures (capture phase)
        window.addEventListener('error', function(e) {
          if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            log("FAILED TO LOAD RESOURCE: " + (e.target.src || e.target.href), true);
          }
        }, true);

        // Intercept unhandled JS exceptions
        window.onerror = function(message, source, lineno, colno, error) {
          log("JS EXCEPTION: " + message + " at " + source + ":" + lineno + ":" + colno, true);
          if (error && error.stack) {
            log("STACK: " + error.stack, true);
          }
          return false;
        };

        // Intercept console error calls
        const oldError = console.error;
        console.error = function() {
          log("CONSOLE ERROR: " + Array.from(arguments).join(' '), true);
          oldError.apply(console, arguments);
        };

        function updateScreen() {
          let debugDiv = document.getElementById('diagnostics-console');
          if (!debugDiv) {
            debugDiv = document.createElement('div');
            debugDiv.id = 'diagnostics-console';
            debugDiv.style.color = '#1e293b';
            debugDiv.style.padding = '24px';
            debugDiv.style.fontSize = '15px';
            debugDiv.style.background = '#f8fafc';
            debugDiv.style.position = 'fixed';
            debugDiv.style.inset = '0';
            debugDiv.style.zIndex = '999999';
            debugDiv.style.overflow = 'auto';
            debugDiv.style.fontFamily = 'monospace';
            document.documentElement.appendChild(debugDiv);
          }
          debugDiv.innerHTML = '<h1 style="color:#991b1b; margin-bottom:10px; font-size:24px;">🚨 DIAGNOSTIC CONSOLE ACTIVE</h1>' +
                              '<p style="color:#475569; margin-bottom:15px;">If you see this screen, a script resource failed to load or React crashed during boot.</p>' +
                              '<h3 style="margin-top:20px; padding-bottom:6px; border-bottom:2px solid #cbd5e1; color:#0f172a;">📋 Logs & Events:</h3>' +
                              '<pre style="background:#f1f5f9; padding:12px; border-radius:8px; overflow:auto; font-size:13px; line-height:1.5; color:#334155;">' + 
                              logs.join('\n') + '</pre>' +
                              '<button onclick="location.reload(true)" style="margin-top:15px; background:#10b981; color:white; font-weight:bold; padding:10px 18px; border-radius:8px; border:none; cursor:pointer; font-size:14px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);">🔄 Force Refresh Page</button>';
        }

        // Log initial template parsing state
        log("HTML parsed successfully. Bootstrapping React assets...");
      })();
    </script>

    <!-- 📱 iPad Web App Standalone Viewport Optimizations -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- 🍏 Apple Standalone Mobile Web App Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trains Atlas" />
    
    <!-- 📦 PWA Web Manifest Binders -->
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Google Font "Quicksand" for large child-accessible rounded lettering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet" />

    <title>My Trains Atlas!</title>
    <script type="module" crossorigin="use-credentials" src="./assets/index-D10KY02B.js"></script>
    <link rel="stylesheet" href="./assets/index-DapXUJCZ.css">
  </head>
  <body class="bg-[#f0fdf4]">
    <div id="root"></div>
  </body>
</html>
