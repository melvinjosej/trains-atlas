<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    
    <!-- 🚨 Global Diagnostic Error Catcher for Remote iPad Debugging -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        setTimeout(() => {
          const div = document.createElement('div');
          div.style.color = '#991b1b';
          div.style.padding = '24px';
          div.style.fontSize = '18px';
          div.style.background = '#fef2f2';
          div.style.position = 'fixed';
          div.style.inset = '0';
          div.style.zIndex = '999999';
          div.style.overflow = 'auto';
          div.style.fontFamily = 'monospace';
          div.innerHTML = '<h1>🚨 MAGICAL TRAINS ATLAS CRASHED!</h1>' +
                          '<p><b>Error Message:</b> ' + message + '</p>' +
                          '<p><b>File:</b> ' + source + '</p>' +
                          '<p><b>Line/Col:</b> ' + lineno + ':' + colno + '</p>' +
                          '<h3 style="margin-top:20px;">📋 Stack Trace:</h3>' +
                          '<pre style="background:#fee2e2; padding:12px; border-radius:8px; overflow:auto;">' + 
                          (error ? error.stack : 'No stack trace available') + '</pre>';
          document.body.appendChild(div);
        }, 500); // Slight delay to ensure body element exists
        return false;
      };
    </script>

    <!-- 📱 iPad Web App Standalone Viewport Optimizations -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- 🍏 Apple Standalone Mobile Web App Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trains Atlas" />
    
    <!-- 📦 PWA Web Manifest Binders -->
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Google Font "Quicksand" for large child-accessible rounded lettering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com"  />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet" />
